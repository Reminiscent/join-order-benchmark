[scenario.main]
description = "Primary algorithm validation path on full JOB and JOB-Complex."
default_variants = ["dp", "geqo"]
reps = 3
statement_timeout_ms = 600000
stabilize = "vacuum_freeze_analyze"
variant_order_mode = "rotate"
session_gucs = { join_collapse_limit = 100, max_parallel_workers_per_gather = 0, work_mem = "1GB", effective_cache_size = "8GB" }

[[scenario.main.dataset]]
name = "job"

[[scenario.main.dataset]]
name = "job_complex"

[scenario.extended]
description = "Broader validation with self-contained planning-stress workloads, excluding CEB IMDB 3k."
default_variants = ["dp", "geqo"]
reps = 3
statement_timeout_ms = 600000
stabilize = "vacuum_freeze_analyze"
variant_order_mode = "rotate"
session_gucs = { join_collapse_limit = 100, max_parallel_workers_per_gather = 0, work_mem = "1GB", effective_cache_size = "8GB" }

[[scenario.extended.dataset]]
name = "job"

[[scenario.extended.dataset]]
name = "job_complex"

[[scenario.extended.dataset]]
name = "sqlite_select5"

[[scenario.extended.dataset]]
name = "gpuqo_chain_small"

[[scenario.extended.dataset]]
name = "gpuqo_star_small"

[[scenario.extended.dataset]]
name = "gpuqo_snowflake_small"

[[scenario.extended.dataset]]
name = "gpuqo_clique_small"
exclude_variants = ["dp"]

[[scenario.extended.dataset]]
name = "gpuqo_clique_small"
variants = ["dp"]
max_join = 12

[scenario.full]
description = "Complete built-in workload, including the heavy CEB IMDB 3k suite."
default_variants = ["dp", "geqo"]
reps = 3
statement_timeout_ms = 600000
stabilize = "vacuum_freeze_analyze"
variant_order_mode = "rotate"
session_gucs = { join_collapse_limit = 100, max_parallel_workers_per_gather = 0, work_mem = "1GB", effective_cache_size = "8GB" }

[[scenario.full.dataset]]
name = "job"

[[scenario.full.dataset]]
name = "job_complex"

[[scenario.full.dataset]]
name = "sqlite_select5"

[[scenario.full.dataset]]
name = "gpuqo_chain_small"

[[scenario.full.dataset]]
name = "gpuqo_star_small"

[[scenario.full.dataset]]
name = "gpuqo_snowflake_small"

[[scenario.full.dataset]]
name = "gpuqo_clique_small"
exclude_variants = ["dp"]

[[scenario.full.dataset]]
name = "gpuqo_clique_small"
variants = ["dp"]
max_join = 12

[[scenario.full.dataset]]
name = "imdb_ceb_3k"
